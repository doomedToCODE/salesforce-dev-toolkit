<template>
    <div class="slds-grid slds-grid_vertical">

        <!-- Step 1: Object + Field Selection -->
        <div class="slds-grid slds-gutters slds-m-bottom_medium slds-grid_vertical-align-end">
            <div class="slds-col slds-size_4-of-12">
                <lightning-combobox
                    name="objectSelector"
                    label="Object"
                    placeholder="Select an SObject..."
                    options={objectOptions}
                    value={selectedObject}
                    onchange={handleObjectSelect}
                ></lightning-combobox>
            </div>
            <div class="slds-col slds-size_6-of-12">
                <template lwc:if={hasObject}>
                    <lightning-dual-listbox
                        name="fieldSelector"
                        label="Fields to Edit"
                        source-label="Available"
                        selected-label="Selected"
                        options={fieldOptions}
                        value={selectedFields}
                        onchange={handleFieldSelect}
                        size="5"
                    ></lightning-dual-listbox>
                </template>
            </div>
            <div class="slds-col slds-size_2-of-12">
                <lightning-button
                    label="Load Records"
                    variant="brand"
                    icon-name="utility:download"
                    onclick={handleQuery}
                    disabled={isQueryDisabled}
                ></lightning-button>
            </div>
        </div>

        <!-- Error -->
        <template lwc:if={error}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <lightning-icon icon-name="utility:error" variant="inverse" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                <span>{error}</span>
            </div>
        </template>

        <!-- Success -->
        <template lwc:if={successMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_success slds-m-bottom_medium" role="alert">
                <lightning-icon icon-name="utility:success" variant="inverse" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                <span>{successMessage}</span>
            </div>
        </template>

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Data Grid -->
        <template lwc:if={hasData}>

            <!-- Action Toolbar -->
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                <div class="slds-col">
                    <span class="slds-badge slds-badge_lightest slds-m-right_small">
                        {paginationLabel}
                    </span>
                    <template lwc:if={hasEdits}>
                        <span class="slds-badge slds-theme_warning slds-m-right_small">
                            {editCountLabel}
                        </span>
                    </template>
                </div>
                <div class="slds-col slds-text-align_right">
                    <lightning-button-group>
                        <!-- CSV Export -->
                        <lightning-button
                            label="Export CSV"
                            variant="neutral"
                            icon-name="utility:download"
                            onclick={handleExportCsv}
                        ></lightning-button>

                        <!-- Discard Edits -->
                        <template lwc:if={hasEdits}>
                            <lightning-button
                                label="Discard Edits"
                                variant="destructive-text"
                                icon-name="utility:undo"
                                onclick={handleDiscardEdits}
                            ></lightning-button>
                        </template>

                        <!-- Save Changes -->
                        <lightning-button
                            label="Save Changes"
                            variant="brand"
                            icon-name="utility:save"
                            onclick={handleSaveClick}
                            disabled={isSaveDisabled}
                        ></lightning-button>

                        <!-- Bulk Delete -->
                        <template lwc:if={hasSelectedRows}>
                            <lightning-button
                                label={deleteCountLabel}
                                variant="destructive"
                                icon-name="utility:delete"
                                onclick={handleDeleteClick}
                            ></lightning-button>
                        </template>
                    </lightning-button-group>
                </div>
            </div>

            <!-- Editable Datatable -->
            <lightning-datatable
                key-field="Id"
                data={data}
                columns={columns}
                show-row-number-column
                onsave={handleCellChange}
                onrowselection={handleRowSelection}
                enable-infinite-loading
            ></lightning-datatable>

            <!-- Load More -->
            <template lwc:if={hasMoreRecords}>
                <div class="slds-grid slds-grid_align-center slds-m-top_medium">
                    <lightning-button
                        label="Load More Records"
                        variant="neutral"
                        icon-name="utility:download"
                        onclick={handleLoadMore}
                        disabled={isLoadingMore}
                    ></lightning-button>
                    <template lwc:if={isLoadingMore}>
                        <lightning-spinner alternative-text="Loading more..." size="small" class="slds-m-left_small"></lightning-spinner>
                    </template>
                </div>
            </template>

        </template>

        <!-- Empty state when no object selected -->
        <template lwc:if={showEmptyState}>
                    <div class="slds-align_absolute-center slds-p-around_large">
                        <div class="slds-text-align_center">
                            <lightning-icon icon-name="utility:edit" size="large" class="slds-m-bottom_small"></lightning-icon>
                            <p class="slds-text-heading_small slds-text-color_weak">
                                Select an object and fields, then click Load Records to start editing.
                            </p>
                        </div>
                    </div>
        </template>

        <!-- Save Confirmation Modal -->
        <template lwc:if={showSaveConfirm}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <div class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Confirm Save</h2>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{saveConfirmMessage}</p>
                    </div>
                    <div class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCancelSave}></lightning-button>
                        <lightning-button label="Save" variant="brand" onclick={handleConfirmSave} class="slds-m-left_x-small"></lightning-button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Delete Confirmation Modal -->
        <template lwc:if={showDeleteConfirm}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <div class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Confirm Delete</h2>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{deleteConfirmMessage}</p>
                    </div>
                    <div class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCancelDelete}></lightning-button>
                        <lightning-button label="Delete" variant="destructive" onclick={handleConfirmDelete} class="slds-m-left_x-small"></lightning-button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </div>
</template>
