<template>
    <!-- Loading spinner -->
    <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_large">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Results datatable -->
    <template lwc:if={hasData}>
        <lightning-card title="Query Results" icon-name="utility:table">
            <div slot="actions">
                <span class="slds-badge slds-badge_lightest">{rowCountLabel}</span>
            </div>
            <div class="slds-p-around_small">
                <lightning-datatable
                    key-field="Id"
                    data={records}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column
                    max-row-selection="0"
                    enable-infinite-loading
                ></lightning-datatable>
            </div>
        </lightning-card>
    </template>

    <!-- Empty state (after a run with no results and no error) -->
    <template lwc:if={showEmpty}>
        <div class="slds-align_absolute-center slds-p-around_large">
            <div class="slds-text-align_center">
                <lightning-icon icon-name="utility:info" size="large" class="slds-m-bottom_small"></lightning-icon>
                <p class="slds-text-heading_small slds-text-color_weak">No records returned.</p>
            </div>
        </div>
    </template>
</template>
