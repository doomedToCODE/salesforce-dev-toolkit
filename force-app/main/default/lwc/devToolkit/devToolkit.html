<template>
    <!-- Full-page app shell -->
    <div class="slds-grid slds-grid_vertical slds-full-height">

        <!-- Top Header Bar -->
        <header class="slds-page-header slds-shrink-none" role="banner">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="utility:setup" size="medium" alternative-text="Developer Toolkit"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span class="slds-page-header__title slds-truncate" title="Developer Toolkit">Developer Toolkit</span>
                                    </h1>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <lightning-icon icon-name="standard:user" size="small" alternative-text="User"></lightning-icon>
                    </div>
                </div>
            </div>
        </header>

        <!-- Body: Sidebar + Main Content -->
        <div class="slds-grid slds-grow">

            <!-- Left Sidebar Navigation -->
            <aside class="slds-shrink-none slds-border_right" style="width: 16rem;">
                <div class="slds-p-around_small">
                    <lightning-vertical-navigation
                        selected-item={currentView}
                        onselect={handleNavSelect}
                    >
                        <lightning-vertical-navigation-section label="Tools">
                            <lightning-vertical-navigation-item label="Query Runner" name="queryRunner"></lightning-vertical-navigation-item>
                            <lightning-vertical-navigation-item label="Object Explorer" name="objectExplorer"></lightning-vertical-navigation-item>
                            <lightning-vertical-navigation-item label="Record Viewer" name="recordViewer"></lightning-vertical-navigation-item>
                            <lightning-vertical-navigation-item label="Data Editor" name="dataEditor"></lightning-vertical-navigation-item>
                            <lightning-vertical-navigation-item label="Utilities" name="utilities"></lightning-vertical-navigation-item>
                        </lightning-vertical-navigation-section>
                    </lightning-vertical-navigation>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="slds-grow slds-p-around_medium">

                <template lwc:if={isQueryRunner}>
                    <lightning-card title="Query Runner" icon-name="utility:search">
                        <div class="slds-p-around_medium">
                            <c-query-runner></c-query-runner>
                        </div>
                    </lightning-card>
                </template>

                <template lwc:if={isObjectExplorer}>
                    <lightning-card title="Object Explorer" icon-name="utility:database">
                        <div class="slds-p-around_medium">
                            <c-object-explorer></c-object-explorer>
                        </div>
                    </lightning-card>
                </template>

                <template lwc:if={isRecordViewer}>
                    <lightning-card title="Record Viewer" icon-name="utility:preview">
                        <div class="slds-p-around_medium">
                            <c-record-viewer></c-record-viewer>
                        </div>
                    </lightning-card>
                </template>

                <template lwc:if={isDataEditor}>
                    <lightning-card title="Data Editor" icon-name="utility:edit">
                        <div class="slds-p-around_medium">
                            <c-data-editor></c-data-editor>
                        </div>
                    </lightning-card>
                </template>

                <template lwc:if={isUtilities}>
                    <lightning-card title="Utilities" icon-name="utility:settings">
                        <div class="slds-p-around_medium">
                            <c-org-utilities></c-org-utilities>
                        </div>
                    </lightning-card>
                </template>

            </main>

        </div>

    </div>
</template>
